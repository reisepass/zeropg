apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: supabase-zeropg
  labels:
    zeropg-demo: "true"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "1"        # single writer on the GCS datadir
        autoscaling.knative.dev/minScale: "0"        # scale to zero (app + auth + db as one unit)
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/cpu-throttling: "false"   # keep CPU while warm so the WAL-ship timer runs
        # auth depends on db (needs the wire + the auth schema). app (ingress) does
        # NOT depend on db/auth: it must bind and serve the login shell INSTANTLY
        # while PGlite restores from GCS behind it (split-frontend). Its /api/ready
        # polls db+auth; /rest + /auth proxy calls 503 until the backend is up.
        run.googleapis.com/container-dependencies: '{"auth":["db"]}'
    spec:
      serviceAccountName: blob-pglite-dev@blob-pglite.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        # ---- ingress: frontend + Kong-style reverse proxy (serves Cloud Run port) ----
        - name: app
          image: europe-west1-docker.pkg.dev/blob-pglite/zeropg/supabase-frontend:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            # PORT is injected by Cloud Run for the ingress container (8080); the
            # frontend reads process.env.PORT, so we must NOT set it here.
            - name: ZEROPG_DB_CONTROL
              value: "http://127.0.0.1:8081"   # db sidecar control/REST-proxy face
            - name: GOTRUE_URL
              value: "http://127.0.0.1:9999"   # auth sidecar
            - name: SUPABASE_JWT_SECRET        # mints the anon key; shared with GoTrue + PostgREST
              valueFrom:
                secretKeyRef:
                  name: supabase-jwt-secret
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 256Mi

        # ---- GoTrue (Supabase auth) ----
        - name: auth
          image: europe-west1-docker.pkg.dev/blob-pglite/zeropg/supabase-auth:latest
          env:
            - name: GOTRUE_API_HOST
              value: "0.0.0.0"
            - name: GOTRUE_API_PORT
              value: "9999"
            - name: GOTRUE_DB_DRIVER
              value: "postgres"
            # statement_cache_mode=describe => pgx v4 DESCRIBEs via the anonymous
            # prepared statement (correct type OIDs, JSONB safe) but never persists a
            # NAMED server-side prepared statement => no 42P05 on the single session.
            - name: GOTRUE_DB_DATABASE_URL
              value: "postgres://postgres@127.0.0.1:5432/postgres?sslmode=disable&statement_cache_mode=describe"
            - name: GOTRUE_SITE_URL
              value: "https://supabase-scale-to-zero.0rs.org"
            - name: API_EXTERNAL_URL
              value: "https://supabase-scale-to-zero.0rs.org/auth/v1"
            - name: GOTRUE_JWT_AUD
              value: "authenticated"
            - name: GOTRUE_JWT_DEFAULT_GROUP_NAME
              value: "authenticated"
            - name: GOTRUE_JWT_ADMIN_ROLES
              value: "service_role"
            - name: GOTRUE_JWT_EXP
              value: "3600"
            - name: GOTRUE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-jwt-secret
                  key: latest
            - name: GOTRUE_DISABLE_SIGNUP
              value: "false"
            # No mail server. Demo: autoconfirm so signup completes without email.
            # For a real magic-link flow, set MAILER_AUTOCONFIRM=false and configure
            # the Resend/SMTP-API mailer env (GOTRUE_SMTP_* or the external mailer URL).
            - name: GOTRUE_MAILER_AUTOCONFIRM
              value: "true"
            - name: GOTRUE_EXTERNAL_EMAIL_ENABLED
              value: "true"
            - name: GOTRUE_LOG_LEVEL
              value: "warn"
            # wire-readiness probe targets (entrypoint)
            - name: ZEROPG_DB_HOST
              value: "127.0.0.1"
            - name: ZEROPG_DB_PORT
              value: "5432"
          resources:
            limits:
              cpu: "1"
              memory: 256Mi

        # ---- zeropg sidecar: GCS-backed Postgres on localhost:5432 + in-process PostgREST + pgvector ----
        - name: db
          image: europe-west1-docker.pkg.dev/blob-pglite/zeropg/supabase-zeropg-db:latest
          env:
            - name: ZEROPG_BUCKET
              value: "zeropg-experiments-euw1"
            - name: ZEROPG_PREFIX
              value: "cloudrun-supabase-v4"
            - name: ZEROPG_WIRE_PORT
              value: "5432"
            - name: ZEROPG_REST_PORT
              value: "3000"
            - name: PORT
              value: "8081"            # db control/health + /rest proxy face
            - name: APP_LABEL
              value: "supabase"
            # PostgREST verifies JWTs with the SAME secret GoTrue signs with, and
            # switches DB role to the token's `role` claim => RLS enforced.
            - name: PGRST_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-jwt-secret
                  key: latest
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: 8081
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 40       # up to ~2min for first restore
  traffic:
    - percent: 100
      latestRevision: true
