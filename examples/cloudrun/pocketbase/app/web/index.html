<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>zeropocket — PocketBase-style admin on zeropg</title>
<style>
  :root { --bg:#0f1117; --panel:#171a23; --line:#262b38; --fg:#e6e9ef; --mut:#8a93a6; --acc:#5b8cff; --ok:#3ddc84; --err:#ff6b6b; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }
  header { display:flex; align-items:center; gap:12px; padding:14px 20px; border-bottom:1px solid var(--line); background:var(--panel); }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header .sub { color:var(--mut); font-size:12px; }
  #status { margin-left:auto; font-size:12px; padding:3px 9px; border-radius:999px; border:1px solid var(--line); color:var(--mut); }
  #status.ready { color:var(--ok); border-color:var(--ok); }
  #status.warming { color:#e0b84a; border-color:#e0b84a; }
  #status.error { color:var(--err); border-color:var(--err); }
  main { max-width:1000px; margin:0 auto; padding:24px 20px; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:18px; margin-bottom:18px; }
  h2 { font-size:14px; margin:0 0 12px; font-weight:600; color:var(--fg); }
  label { display:block; font-size:12px; color:var(--mut); margin:8px 0 3px; }
  input, select { width:100%; padding:8px 10px; background:var(--bg); border:1px solid var(--line); border-radius:7px; color:var(--fg); font:inherit; }
  button { padding:8px 14px; background:var(--acc); color:#fff; border:0; border-radius:7px; font:inherit; cursor:pointer; }
  button.ghost { background:transparent; border:1px solid var(--line); color:var(--fg); }
  button.danger { background:transparent; border:1px solid var(--err); color:var(--err); }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .row { display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; }
  .row > div { flex:1; min-width:140px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:7px 9px; border-bottom:1px solid var(--line); vertical-align:top; }
  th { color:var(--mut); font-weight:500; }
  code { background:var(--bg); padding:1px 5px; border-radius:4px; border:1px solid var(--line); font-size:12px; word-break:break-all; }
  .muted { color:var(--mut); }
  .err { color:var(--err); }
  .ok { color:var(--ok); }
  .pill { display:inline-block; padding:1px 7px; border:1px solid var(--line); border-radius:999px; font-size:11px; color:var(--mut); cursor:pointer; }
  .pill.active { color:var(--acc); border-color:var(--acc); }
  .hidden { display:none; }
  .toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; align-items:center; }
  .fieldrow { display:flex; gap:8px; margin-bottom:6px; }
  .fieldrow input { flex:2; } .fieldrow select { flex:1; }
  small.hint { color:var(--mut); display:block; margin-top:6px; }
</style>
</head>
<body>
<header>
  <h1>zeropocket</h1>
  <span class="sub">PocketBase-style backend · scale-to-zero Postgres (zeropg)</span>
  <span id="status">connecting…</span>
</header>
<main>
  <!-- AUTH -->
  <section id="authPanel" class="panel">
    <h2>Admin / user login</h2>
    <div class="row">
      <div><label>Email</label><input id="email" type="email" placeholder="you@example.com" autocomplete="username" /></div>
      <div><label>Password</label><input id="password" type="password" placeholder="min 6 chars" autocomplete="current-password" /></div>
      <div style="flex:0 0 auto; display:flex; gap:8px;">
        <button id="loginBtn">Log in</button>
        <button id="registerBtn" class="ghost">Register</button>
      </div>
    </div>
    <small class="hint">First run: register an account, then create a collection and records. JWT is stored in localStorage.</small>
    <div id="authMsg" class="err" style="margin-top:8px;"></div>
  </section>

  <!-- APP (post-login) -->
  <section id="appPanel" class="hidden">
    <div class="panel">
      <div class="toolbar">
        <strong>Signed in as <span id="meEmail" class="ok"></span></strong>
        <button id="logoutBtn" class="ghost" style="margin-left:auto;">Log out</button>
      </div>
    </div>

    <!-- collection builder -->
    <div class="panel">
      <h2>Collections</h2>
      <div id="collList" class="muted">…</div>
      <hr style="border-color:var(--line); margin:14px 0;" />
      <div class="row">
        <div><label>New collection name</label><input id="newCollName" placeholder="posts" /></div>
      </div>
      <label>Fields</label>
      <div id="fieldRows"></div>
      <button id="addFieldBtn" class="ghost" style="margin-top:6px;">+ field</button>
      <div style="margin-top:12px;"><button id="createCollBtn">Create collection</button></div>
      <div id="collMsg" class="err" style="margin-top:8px;"></div>
    </div>

    <!-- records -->
    <div class="panel">
      <h2>Records <span id="recColl" class="muted"></span></h2>
      <div id="recCreate"></div>
      <div id="recTable" class="muted">Select a collection above.</div>
      <div id="recMsg" class="err" style="margin-top:8px;"></div>
    </div>
  </section>
</main>

<script>
// ---- tiny client ----
const $ = s => document.querySelector(s);
let token = localStorage.getItem("zp_token") || "";
let me = JSON.parse(localStorage.getItem("zp_me") || "null");
let collections = [];
let activeColl = null;

async function api(method, path, body) {
  const headers = { "Content-Type": "application/json" };
  if (token) headers["Authorization"] = "Bearer " + token;
  const res = await fetch(path, { method, headers, body: body ? JSON.stringify(body) : undefined });
  let data = null;
  try { data = await res.json(); } catch (_) {}
  if (!res.ok) throw new Error((data && data.error) || (method + " " + path + " -> " + res.status));
  return data;
}

// ---- WAKE: fire-and-forget on page load so the backend DB warms during think-time.
// The page itself is already served (instant, no DB); this nudges the db sidecar.
fetch("/api/wake", { method: "POST" }).catch(() => {});

// ---- status poller (does not block UI) ----
async function pollStatus() {
  const el = $("#status");
  try {
    const h = await (await fetch("/api/health")).json();
    if (h.db === "ready") { el.textContent = "db ready"; el.className = "ready"; }
    else if (h.db === "warming") { el.textContent = "db warming…"; el.className = "warming"; setTimeout(pollStatus, 1000); }
    else { el.textContent = "db error"; el.className = "error"; }
  } catch (_) { el.textContent = "offline"; el.className = "error"; setTimeout(pollStatus, 2000); }
}
pollStatus();

// ---- auth ----
async function doAuth(path) {
  $("#authMsg").textContent = "";
  try {
    const r = await api("POST", path, { email: $("#email").value.trim(), password: $("#password").value });
    token = r.token; me = r.user;
    localStorage.setItem("zp_token", token);
    localStorage.setItem("zp_me", JSON.stringify(me));
    showApp();
  } catch (e) { $("#authMsg").textContent = e.message; }
}
$("#loginBtn").onclick = () => doAuth("/api/auth/login");
$("#registerBtn").onclick = () => doAuth("/api/auth/register");
$("#logoutBtn").onclick = () => { token=""; me=null; localStorage.clear(); location.reload(); };

function showApp() {
  $("#authPanel").classList.add("hidden");
  $("#appPanel").classList.remove("hidden");
  $("#meEmail").textContent = me ? me.email : "";
  loadCollections();
}

// ---- collections ----
function fieldRowHTML() {
  return `<div class="fieldrow">
    <input placeholder="field name (e.g. title)" />
    <select><option value="text">text</option><option value="number">number</option><option value="bool">bool</option></select>
    <button class="ghost rmField" type="button">✕</button>
  </div>`;
}
$("#addFieldBtn").onclick = () => { $("#fieldRows").insertAdjacentHTML("beforeend", fieldRowHTML()); };
$("#fieldRows").addEventListener("click", e => { if (e.target.classList.contains("rmField")) e.target.closest(".fieldrow").remove(); });
$("#fieldRows").innerHTML = fieldRowHTML();

async function loadCollections() {
  try {
    const r = await api("GET", "/api/collections");
    collections = r.collections || [];
    renderCollList();
  } catch (e) { $("#collMsg").textContent = e.message; }
}
function renderCollList() {
  const el = $("#collList");
  if (!collections.length) { el.innerHTML = '<span class="muted">No collections yet. Create one below.</span>'; return; }
  el.innerHTML = collections.map(c =>
    `<span class="pill ${activeColl && activeColl.name===c.name ? 'active':''}" data-coll="${c.name}">${c.name} (${(c.fields||[]).map(f=>f.name+':'+f.type).join(', ')||'no fields'})</span>`
  ).join(" ") + ' &nbsp; ' +
    (activeColl ? `<button class="danger" id="dropCollBtn" style="font-size:12px;padding:3px 8px;">drop "${activeColl.name}"</button>` : '');
  el.querySelectorAll(".pill").forEach(p => p.onclick = () => selectColl(p.dataset.coll));
  const drop = $("#dropCollBtn");
  if (drop) drop.onclick = async () => {
    if (!confirm('Drop collection "'+activeColl.name+'" and its table?')) return;
    try { await api("DELETE", "/api/collections/"+activeColl.name); activeColl=null; $("#recTable").innerHTML='Select a collection above.'; $("#recCreate").innerHTML=''; $("#recColl").textContent=''; await loadCollections(); }
    catch(e){ $("#collMsg").textContent=e.message; }
  };
}
$("#createCollBtn").onclick = async () => {
  $("#collMsg").textContent = "";
  const name = $("#newCollName").value.trim();
  const fields = [...$("#fieldRows").querySelectorAll(".fieldrow")].map(r => ({
    name: r.querySelector("input").value.trim(), type: r.querySelector("select").value
  })).filter(f => f.name);
  try {
    await api("POST", "/api/collections", { name, fields });
    $("#newCollName").value = ""; $("#fieldRows").innerHTML = fieldRowHTML();
    await loadCollections(); selectColl(name);
  } catch (e) { $("#collMsg").textContent = e.message; }
};

// ---- records ----
function selectColl(name) {
  activeColl = collections.find(c => c.name === name) || null;
  renderCollList();
  $("#recColl").textContent = activeColl ? "· " + activeColl.name : "";
  renderRecCreate();
  loadRecords();
}
function renderRecCreate() {
  if (!activeColl) { $("#recCreate").innerHTML = ""; return; }
  const inputs = (activeColl.fields||[]).map(f => {
    if (f.type === "bool") return `<div><label>${f.name} (bool)</label><select data-f="${f.name}" data-t="bool"><option value="false">false</option><option value="true">true</option></select></div>`;
    const t = f.type === "number" ? "number" : "text";
    return `<div><label>${f.name} (${f.type})</label><input data-f="${f.name}" data-t="${f.type}" type="${t}" /></div>`;
  }).join("");
  $("#recCreate").innerHTML = `<div class="row" style="margin-bottom:14px;">${inputs}<div style="flex:0 0 auto;"><label>&nbsp;</label><button id="addRecBtn">Add record</button></div></div>`;
  $("#addRecBtn").onclick = async () => {
    $("#recMsg").textContent = "";
    const body = {};
    $("#recCreate").querySelectorAll("[data-f]").forEach(el => {
      const f = el.dataset.f, t = el.dataset.t;
      if (el.value === "" && t !== "bool") return;
      body[f] = t === "number" ? Number(el.value) : t === "bool" ? (el.value === "true") : el.value;
    });
    try { await api("POST", "/api/collections/"+activeColl.name+"/records", body); $("#recCreate").querySelectorAll("input").forEach(i=>i.value=""); loadRecords(); }
    catch (e) { $("#recMsg").textContent = e.message; }
  };
}
async function loadRecords() {
  if (!activeColl) return;
  try {
    const r = await api("GET", "/api/collections/"+activeColl.name+"/records?perPage=100");
    const items = r.items || [];
    const cols = ["id", ...(activeColl.fields||[]).map(f=>f.name), "created"];
    if (!items.length) { $("#recTable").innerHTML = '<span class="muted">No records yet.</span>'; return; }
    $("#recTable").innerHTML = `<table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join("")}<th></th></tr></thead><tbody>${
      items.map(it => `<tr>${cols.map(c => `<td>${c==="id" ? `<code>${esc(it[c])}</code>` : esc(fmt(it[c]))}</td>`).join("")}<td><button class="danger delRec" data-id="${esc(it.id)}" style="font-size:11px;padding:2px 7px;">del</button></td></tr>`).join("")
    }</tbody></table><div class="muted" style="margin-top:8px;">${r.totalItems} record(s)</div>`;
    $("#recTable").querySelectorAll(".delRec").forEach(b => b.onclick = async () => {
      try { await api("DELETE", "/api/collections/"+activeColl.name+"/records/"+b.dataset.id); loadRecords(); }
      catch(e){ $("#recMsg").textContent=e.message; }
    });
  } catch (e) { $("#recMsg").textContent = e.message; }
}
function fmt(v){ if(v===null||v===undefined) return ""; if(typeof v==="object") return JSON.stringify(v); return String(v); }
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// boot: if we already have a token, show the app
if (token && me) showApp();
</script>
</body>
</html>
