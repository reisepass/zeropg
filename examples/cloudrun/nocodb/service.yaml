apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: nocodb-zeropg
  labels:
    zeropg-demo: "true"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "1"
        autoscaling.knative.dev/minScale: "0"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/container-dependencies: '{"app":["db"]}'
    spec:
      serviceAccountName: blob-pglite-dev@blob-pglite.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - name: app                                   # NocoDB (official image, unmodified)
          image: docker.io/nocodb/nocodb:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            # The ONLY change vs stock NocoDB: point its metadata DB at the
            # zeropg sidecar over localhost instead of a Postgres server.
            - name: NC_DB
              value: "pg://127.0.0.1:5432?u=postgres&p=postgres&d=postgres"
            - name: NC_DISABLE_TELE
              value: "true"
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 40                      # NocoDB bootstraps 124 tables on first boot
        - name: db                                    # zeropg sidecar (same image as PrivateBin's)
          image: europe-west1-docker.pkg.dev/blob-pglite/zeropg/zeropg-db-sidecar:latest
          env:
            - name: ZEROPG_BUCKET
              value: "zeropg-experiments-euw1"
            - name: ZEROPG_PREFIX
              value: "cloudrun-nocodb"
            - name: ZEROPG_WIRE_PORT
              value: "5432"
            - name: PORT
              value: "8081"
            - name: APP_LABEL
              value: "nocodb"
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /healthz
              port: 8081
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 40
  traffic:
    - percent: 100
      latestRevision: true
