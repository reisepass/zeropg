<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>airtable-on-zeropg</title>
<style>
  :root { --bg:#f7f8fa; --line:#e2e5ea; --ink:#1f2430; --muted:#7a8294; --accent:#2d6cdf; --accent2:#1b4fb0; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; color:var(--ink); background:var(--bg); }
  header { display:flex; align-items:center; gap:12px; padding:10px 16px; background:#fff; border-bottom:1px solid var(--line); }
  header h1 { font-size:15px; margin:0; font-weight:650; }
  .badge { font-size:11px; padding:2px 8px; border-radius:999px; background:#eef3ff; color:var(--accent2); }
  #wake-state { margin-left:auto; font-size:12px; color:var(--muted); }
  .layout { display:flex; height:calc(100vh - 49px); }
  .sidebar { width:230px; border-right:1px solid var(--line); background:#fff; padding:12px; overflow:auto; }
  .sidebar h2 { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:6px 4px 8px; }
  .tbl-item { display:flex; align-items:center; padding:7px 9px; border-radius:7px; cursor:pointer; gap:8px; }
  .tbl-item:hover { background:#f1f3f7; }
  .tbl-item.active { background:#eef3ff; color:var(--accent2); font-weight:600; }
  .tbl-item .del { margin-left:auto; opacity:0; color:var(--muted); font-size:15px; }
  .tbl-item:hover .del { opacity:.7; }
  .main { flex:1; overflow:auto; padding:16px; }
  .toolbar { display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
  button { font:inherit; padding:6px 12px; border:1px solid var(--line); background:#fff; border-radius:7px; cursor:pointer; }
  button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  button.primary:hover { background:var(--accent2); }
  button:hover { background:#f1f3f7; }
  input, select { font:inherit; padding:6px 9px; border:1px solid var(--line); border-radius:7px; background:#fff; }
  table.grid { border-collapse:collapse; background:#fff; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .grid th { background:#fafbfc; text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); border-right:1px solid var(--line); font-weight:600; white-space:nowrap; }
  .grid th .ctype { font-size:10px; color:var(--muted); font-weight:400; margin-left:5px; }
  .grid th .delcol { float:right; color:var(--muted); cursor:pointer; margin-left:8px; }
  .grid td { padding:0; border-bottom:1px solid var(--line); border-right:1px solid var(--line); min-width:130px; }
  .grid td input, .grid td select { border:0; border-radius:0; width:100%; padding:8px 10px; background:transparent; }
  .grid td input:focus, .grid td select:focus { outline:2px solid var(--accent); outline-offset:-2px; }
  .cell-saving { background:#fff8e1; }
  .cell-error { background:#fdecec; }
  .empty { color:var(--muted); padding:40px; text-align:center; }
  .addcol { display:inline-flex; gap:6px; align-items:center; }
  dialog { border:1px solid var(--line); border-radius:10px; padding:18px; min-width:300px; }
  dialog h3 { margin:0 0 12px; font-size:15px; }
  dialog .row { display:flex; flex-direction:column; gap:4px; margin-bottom:10px; }
  dialog label { font-size:12px; color:var(--muted); }
  .choices-hint { font-size:11px; color:var(--muted); }
</style>
</head>
<body>
<header>
  <h1>airtable-on-zeropg</h1>
  <span class="badge">scale-to-zero</span>
  <span id="wake-state">starting backend...</span>
</header>
<div class="layout">
  <aside class="sidebar">
    <h2>Tables</h2>
    <div id="table-list"></div>
    <button id="new-table" style="width:100%;margin-top:10px">+ New table</button>
  </aside>
  <main class="main" id="main">
    <div class="empty">Pick or create a table to get started.</div>
  </main>
</div>

<dialog id="col-dialog">
  <h3>Add column</h3>
  <div class="row"><label>Name</label><input id="col-name" placeholder="e.g. Priority" /></div>
  <div class="row"><label>Type</label>
    <select id="col-type">
      <option value="text">Text</option>
      <option value="number">Number</option>
      <option value="bool">Checkbox</option>
      <option value="date">Date</option>
      <option value="select">Single select</option>
    </select>
  </div>
  <div class="row" id="choices-row" style="display:none">
    <label>Choices (comma-separated)</label>
    <input id="col-choices" placeholder="todo, doing, done" />
    <span class="choices-hint">Only these values will be accepted.</span>
  </div>
  <div style="display:flex;gap:8px;justify-content:flex-end">
    <button id="col-cancel">Cancel</button>
    <button class="primary" id="col-save">Add</button>
  </div>
</dialog>

<script src="/config.js"></script>
<script src="/app.js"></script>
</body>
</html>
