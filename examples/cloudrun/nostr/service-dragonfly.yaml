apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: nostr-zeropg
  labels:
    zeropg-demo: "true"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "1"        # single writer on the GCS datadir
        autoscaling.knative.dev/minScale: "0"        # scale to zero (app + db + redis as a unit)
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/cpu-throttling: "false"   # keep CPU while warm so the WAL-ship timer runs
        run.googleapis.com/container-dependencies: '{"app":["db","redis"]}'  # app waits for db /ready + redis
    spec:
      serviceAccountName: blob-pglite-dev@blob-pglite.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - name: app                                   # nostream (built from source), ingress container
          image: europe-west1-docker.pkg.dev/blob-pglite/zeropg/nostream-app:latest
          ports:
            - name: http1
              containerPort: 8008                     # Cloud Run sets PORT=8008; nostream listens there
          env:
            # DB -> the zeropg sidecar over localhost (knex/pg, unnamed prepared stmts)
            - name: DB_HOST
              value: "127.0.0.1"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres"
            - name: DB_NAME
              value: "postgres"
            - name: DB_MIN_POOL_SIZE
              value: "1"
            - name: DB_MAX_POOL_SIZE
              value: "2"
            # Redis -> the valkey sidecar over localhost (rate limiting + dedup cache)
            - name: REDIS_HOST
              value: "127.0.0.1"
            - name: REDIS_PORT
              value: "6379"
            # single client worker: cross-worker fan-out is cluster-IPC, and one
            # writer suits the single-session DB; maintenance worker still forks.
            - name: WORKER_COUNT
              value: "1"
            - name: RELAY_PORT
              value: "8008"
            - name: SECRET
              value: "zeropg_cloudrun_nostr_secret_long_enough_abcdef0123456789"
            - name: NOSTR_CONFIG_DIR
              value: "/app/.nostr"
          resources:
            limits:
              cpu: "2"
              memory: 1Gi
          startupProbe:
            tcpSocket:
              port: 8008
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 40
        - name: db                                    # zeropg sidecar: GCS-backed Postgres on localhost:5432
          image: europe-west1-docker.pkg.dev/blob-pglite/zeropg/nostr-db-sidecar:latest
          env:
            - name: ZEROPG_BUCKET
              value: "zeropg-experiments-euw1"
            - name: ZEROPG_PREFIX
              value: "cloudrun-nostr"
            - name: ZEROPG_EXTENSIONS
              value: "uuid_ossp,btree_gin"
            - name: ZEROPG_WIRE_PORT
              value: "5432"
            - name: ZEROPG_CONTROL_PORT
              value: "8081"
            - name: READY_PORT
              value: "8082"
            - name: APP_LABEL
              value: "nostream"
            - name: ZEROPG_RESTART_NONCE
              value: "1"                              # bump to force a cold restart (restore-from-GCS test)
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /
              port: 8082                              # 200 only AFTER migrations applied
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 60
        - name: redis                                 # Dragonfly sidecar (Redis-protocol), scales WITH the instance
          # Verified cold start (autoscaling wake, blob-pglite/europe-west1):
          #   Dragonfly: redis-ready ~0.64s, app serving ~14.2s, boot->HTTP200 14.51s
          #   valkey:    redis-ready ~0.44s, app serving ~15.06s
          # i.e. within noise; the db sidecar (GCS restore ~5s) + nostream app boot
          # dominate, redis is never the long pole. Dragonfly is NOT slower to wake.
          # NOTE: Dragonfly is NOT on Docker Hub. Canonical images are
          # ghcr.io/dragonflydb/dragonfly and docker.dragonflydb.io/dragonflydb/dragonfly.
          # Mirrored into this project's Artifact Registry for a fast in-region pull.
          image: europe-west1-docker.pkg.dev/blob-pglite/zeropg/dragonfly:latest
          # Ephemeral cache: no snapshots (snapshot_cron empty by default + dbfilename
          # blank), cache_mode evicts under pressure like valkey allkeys-lru, one
          # proactor thread suits a 1-CPU sidecar. Listens on 6379 by default.
          # allow-undeclared-keys keeps rate-limiter-flexible / cache Lua from erroring.
          # maxmemory MUST be >= 256mb: Dragonfly enforces a 256MiB-per-thread floor
          # and refuses to boot below it (valkey runs fine at 128mb; Dragonfly does not).
          command: ["dragonfly"]
          args:
            - "--logtostderr"
            - "--port=6379"
            # bind all interfaces: Cloud Run's TCP startup probe connects via the
            # instance IP, not loopback, so --bind=127.0.0.1 makes the probe fail
            # 30x even though Dragonfly is up. valkey defaults to all-interfaces.
            - "--bind=0.0.0.0"
            - "--maxmemory=256mb"
            - "--cache_mode=true"
            - "--proactor_threads=1"
            - "--dbfilename="
            - "--default_lua_flags=allow-undeclared-keys"
          resources:
            limits:
              cpu: "1"
              memory: 512Mi                            # Dragonfly wants more headroom than tiny valkey
          startupProbe:
            tcpSocket:
              port: 6379
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 30
  traffic:
    - percent: 100
      latestRevision: true
